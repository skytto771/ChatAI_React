# ============================================
# HTTP — 用于 Certbot 验证 + 重定向到 HTTPS
# ============================================
server {
    listen       80;
    server_name  xingyu.xingkdsite.top;

    # Certbot ACME 验证（Let's Encrypt 域名验证必须走 HTTP 80）
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # 其余请求重定向到 HTTPS
    location / {
        return 301 https://$host$request_uri;
    }
}

# ============================================
# HTTPS — 主服务
# ============================================
server {
    listen       443 ssl;
    http2        on;
    server_name  xingyu.xingkdsite.top;

    # SSL 证书（由 Certbot 自动管理）
    ssl_certificate     /etc/letsencrypt/live/xingyu.xingkdsite.top/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/xingyu.xingkdsite.top/privkey.pem;

    # SSL 安全配置
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;

    # 前端静态文件
    root   /usr/share/nginx/html;
    index  index.html;

    # Gzip 压缩
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml text/javascript image/svg+xml;
    gzip_min_length 1024;

    # API 代理到后端
    location /api/ {
        proxy_pass http://backend:3000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 300s;
        proxy_connect_timeout 75s;
    }

    # 静态文件代理（上传的图片/视频等）
    location /images/ {
        proxy_pass http://backend:3000;
        proxy_set_header Host $host;
    }

    location /videos/ {
        proxy_pass http://backend:3000;
        proxy_set_header Host $host;
    }

    location /others/ {
        proxy_pass http://backend:3000;
        proxy_set_header Host $host;
    }

    # SPA 路由 fallback
    location / {
        try_files $uri $uri/ /index.html;
    }

    # 安全头
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Strict-Transport-Security "max-age=63072000" always;
}
